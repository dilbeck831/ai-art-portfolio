# Calls Supabase Edge Function process-x-scheduled-posts so queued 𝕏 posts actually send.
# Add repo secret CRON_SECRET (same value as Supabase Edge Function secret CRON_SECRET).

name: Process X scheduled posts

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes UTC
  workflow_dispatch:

# Avoid overlapping runs (two concurrent invokes could process the same rows).
concurrency:
  group: process-x-scheduled-posts
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke worker
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Set GitHub repo secret CRON_SECRET (match Supabase Edge secret)."
            exit 1
          fi
          echo "UTC now: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "CRON_SECRET length (chars, no value): ${#CRON_SECRET}"
          code=$(curl -sS -o /tmp/proc_body -w "%{http_code}" -X POST \
            "https://sbbmducevhpirnthzvtz.supabase.co/functions/v1/process-x-scheduled-posts" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "Response body:"
          cat /tmp/proc_body
          echo ""
          echo "HTTP ${code}"
          if [ "$code" != "200" ]; then exit 1; fi
