# Enable: Repo → Settings → Pages → Build: GitHub Actions
# Custom domain (toxiqmynd.com) serves this repo at the SITE ROOT — not /ai-art-portfolio/.
# ASTRO_BASE must be '/' so asset URLs match GitHub Pages (/_astro/..., /about/..., etc.).
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild every 6 hours so vault search stays in sync with Obsidian pushes.
    # Adjust the interval here: https://crontab.guru
    - cron: '0 */6 * * *'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Vault content ──────────────────────────────────────────────────────
      # Before running: create a GitHub PAT (classic, repo scope read-only)
      # for the private obsidian-vault repo and store it as:
      #   Settings → Secrets and variables → Actions → VAULT_ACCESS_TOKEN
      # Then replace YOUR_GITHUB_USERNAME/obsidian-vault below with the real repo.
      - name: Checkout vault content
        uses: actions/checkout@v4
        with:
          repository: dilbeck831/obsidian-vault
          token: ${{ secrets.VAULT_ACCESS_TOKEN }}
          path: vault-content

      - name: Copy vault content into Astro content collection
        run: |
          mkdir -p src/content/vault
          # Only copy real content folders — exclude plugin data, templates, raw staging
          for dir in 00-inbox 01-projects 02-areas 03-resources 04-archive wiki; do
            if [ -d "vault-content/$dir" ]; then
              mkdir -p "src/content/vault/$dir"
              find "vault-content/$dir" -name "*.md" | while read f; do
                dest="src/content/vault/${f#vault-content/}"
                mkdir -p "$(dirname "$dest")"
                cp "$f" "$dest"
              done
            fi
          done
      # ──────────────────────────────────────────────────────────────────────

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Root of custom domain = base / (see scripts/verify-production-hosting.mjs + curl checks)
          ASTRO_BASE: '/'
          SITE_URL: 'https://toxiqmynd.com'
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
